name: Build, Provision & Deploy – InvoStaq

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  OUTPUT_PATH: '${{ github.workspace }}/publish'
  TF_WORKING_DIR: 'infra/terraform'

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Build
  # ────────────────────────────────────────────
  build:
    name: Build .NET Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore packages
        run: dotnet restore ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Build
        run: |
          dotnet build ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} \
            --configuration Release \
            --no-restore

      - name: Publish
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} \
            --configuration Release \
            --no-build \
            --output ${{ env.OUTPUT_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app-build
          path: ${{ env.OUTPUT_PATH }}

  # ────────────────────────────────────────────
  # Job 2 — Terraform Plan (dry run)
  # ────────────────────────────────────────────
  provision:
    name: Terraform Plan (dry run)
    runs-on: ubuntu-latest
    needs: build


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan (simulate provisioning)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_sql_admin_login: ${{ secrets.SQL_ADMIN_LOGIN }}
          TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: terraform plan

  # ────────────────────────────────────────────
  # Job 3 — Deploy Function App
  # ────────────────────────────────────────────
  deploy:
    name: Deploy Azure Function App
    runs-on: ubuntu-latest
    needs: provision


    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app-build
          path: ${{ env.OUTPUT_PATH }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: ${{ env.OUTPUT_PATH }}

      - name: Azure Logout
        if: always()
        run: az logout
